<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>极简翻译</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="language-switcher language-switcher-single">
        <span class="auto-label">中英互译</span>
      </div>
    </header>

    <!-- 主内容区 -->
    <main class="app-main">
      <!-- 输入区域 -->
      <div class="input-section">
        <div class="input-wrapper">
          <textarea 
            id="source-input" 
            class="source-textarea" 
            placeholder="输入要翻译的文本..."
            rows="3"
            maxlength="1000"
          ></textarea>
          <div class="input-actions">
            <span class="char-count">0/1000</span>
            <button class="icon-button clear-button" title="清空">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- 翻译结果区域 -->
      <div class="result-section">
        <div class="result-header">
          <span class="result-label">翻译结果</span>
          <div class="result-actions">
            <button class="icon-button copy-button" title="复制">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
              </svg>
            </button>
          </div>
        </div>
        
        <div class="result-content">
          <p class="result-placeholder">翻译结果将显示在这里</p>
        </div>
      </div>

      <!-- 设置：翻译服务与 API Key -->
      <div class="settings-section">
        <button type="button" class="settings-toggle" id="settings-toggle" aria-expanded="false">
          <span class="settings-toggle-text">设置 · 翻译服务与 API</span>
          <svg class="settings-chevron" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z" fill="currentColor"/></svg>
        </button>
        <div class="settings-panel" id="settings-panel" hidden>
          <label class="settings-label">翻译服务</label>
          <select id="setting-service" class="settings-select">
            <option value="openai">OpenAI (GPT)</option>
            <option value="claude">Claude (Anthropic)</option>
            <option value="google">Google 翻译</option>
            <option value="kimi">Kimi (Moonshot)</option>
            <option value="qwen">Qwen (通义千问)</option>
            <option value="glm">GLM (智谱)</option>
          </select>
          <div class="settings-api-row" id="api-key-row">
            <label class="settings-label" for="setting-apikey">API Key</label>
            <input type="password" id="setting-apikey" class="settings-input" placeholder="必填" autocomplete="off"/>
          </div>
          <button type="button" class="settings-save" id="settings-save">保存设置</button>
        </div>
      </div>

    </main>

    <!-- 底部 -->
    <footer class="app-footer">
      <span class="footer-text">极简翻译</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
