<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>极简翻译</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <!-- 头部：语言切换指示器 -->
    <header class="app-header">
      <div class="language-switcher">
        <div class="lang-box source-lang">
          <span class="lang-label">自动检测</span>
          <span class="lang-code">AUTO</span>
        </div>
        
        <button class="swap-button" title="切换翻译方向">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
          </svg>
        </button>
        
        <div class="lang-box target-lang">
          <span class="lang-label">目标语言</span>
          <span class="lang-code">EN</span>
        </div>
      </div>
    </header>

    <!-- 主内容区 -->
    <main class="app-main">
      <!-- 输入区域 -->
      <div class="input-section">
        <div class="input-wrapper">
          <textarea 
            id="source-input" 
            class="source-textarea" 
            placeholder="输入要翻译的文本..."
            rows="3"
            maxlength="1000"
          ></textarea>
          <div class="input-actions">
            <span class="char-count">0/1000</span>
            <button class="icon-button clear-button" title="清空">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- 翻译结果区域 -->
      <div class="result-section">
        <div class="result-header">
          <span class="result-label">翻译结果</span>
          <div class="result-actions">
            <button class="icon-button copy-button" title="复制">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
              </svg>
            </button>
          </div>
        </div>
        
        <div class="result-content">
          <p class="result-placeholder">翻译结果将显示在这里</p>
        </div>
      </div>

      <!-- 历史记录 -->
      <div class="history-section">
        <div class="history-header">
          <span class="history-title">最近翻译</span>
          <button class="text-button clear-history">清空</button>
        </div>
        <div class="history-list">
          <!-- 历史记录项将通过 JS 动态插入 -->
          <p class="history-empty">暂无历史记录</p>
        </div>
      </div>
    </main>

    <!-- 底部 -->
    <footer class="app-footer">
      <span class="footer-text">极简翻译 · Apple Design</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
